<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Пользователи</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">
    <script>
        $("#left-navbar li").removeClass("active");
        $("#user-li").addClass('active');
    </script>
    <h2> Пользователи </h2>

    <a th:href="@{/admin/user/create/}" class="btn btn-primary">
        <span>Создать</span>
    </a>
    <br/>
    <br/>

    <!--
      Результаты поиска (partial userResult).
      Flash-уведомления (сброс пароля/ошибка) отображаются внутри userResult,
      чтобы одинаково работать и при include, и при AJAX-поиске.
    -->
    <div id="searchResults">
        <object th:include="admin/user/userResult" th:remove="tag"></object>
    </div>

</div>
</body>
</html>
