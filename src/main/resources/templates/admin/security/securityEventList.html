<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout.html}">
<head>
  <title>События безопасности</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">
  <script>
    $(function(){
      $("#left-navbar li").removeClass("active");
      $("#security-events-li").addClass('active');
    });
  </script>

  <div class="d-flex justify-content-between align-items-center mb-2">
    <h2 class="m-0">События безопасности</h2>
    <a class="btn btn-outline-secondary" th:href="@{/admin/logs/index/}">Логи</a>
  </div>

  <div class="alert alert-info" role="alert" style="padding: 0.5rem 0.75rem">
    Здесь отображаются события: <strong>сброс пароля</strong> и <strong>смена пароля</strong>.
  </div>

  <div id="searchResults">
    <object th:include="admin/security/securityEventResult" th:remove="tag"></object>
  </div>

</div>
</body>
</html>
