<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Смена пароля</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">

    <h4 class="fw-bold py-3 mb-4">Смена пароля</h4>

    <div class="alert alert-warning" role="alert">
        Для продолжения работы необходимо сменить пароль.
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/user/change-password}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="currentPassword">Текущий пароль</label>
                    <input class="form-control" type="password" id="currentPassword" name="currentPassword" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="newPassword">Новый пароль</label>
                    <input class="form-control" type="password" id="newPassword" name="newPassword" required minlength="8">
                    <div class="form-text">Минимум 8 символов.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirmPassword">Повторите новый пароль</label>
                    <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
                </div>

                <button type="submit" class="btn btn-primary">Сменить пароль</button>
                <a class="btn btn-outline-secondary" th:href="@{/logout}">Выйти</a>
            </form>
        </div>
    </div>

</div>
</body>
</html>
