<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout.html}">
<head>
  <title>Ошибка доступа</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">
  <div class="misc-wrapper">
    <h2 class="mb-2 mx-2">Ошибка доступа!</h2>

    <p class="mb-2 mx-2" th:if="${reason}" th:text="${reason}"></p>
    <p class="mb-4 mx-2" th:if="${reason == null}">Oops! 😖 Обратитесь, пожалуйста, администратору.</p>

    <div class="mt-3">
      <img
        th:src="@{/img/illustrations/man-with-laptop-light.png}"
        alt="page-misc-error-light"
        width="500"
        class="img-fluid"
        data-app-dark-img="illustrations/page-misc-error-dark.png"
        data-app-light-img="illustrations/page-misc-error-light.png"
      />
    </div>
  </div>
</div>
</body>
</html>
