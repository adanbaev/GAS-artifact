<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Частота</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">
  <script>
    $("#left-navbar li").removeClass("active");
    $("#freq-li").addClass('active');

  </script>
  <div class="row">
    <!-- Basic Layout -->
    <div class="col-xxl">
      <div class="card-header d-flex align-items-center justify-content-between">
        <small class="text-muted float-end">Новые добавленные элементы</small>
      </div>
      <div class="card">
        <div class="table-responsive text-nowrap">
          <table class="table table-bordered table-hover table-striped">
            <thead>
            <tr class="filters">
              <th>Очередность</th>
              <th>ID</th>
              <th>Тип</th>
              <th>Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr data-th-each="item,iter : ${items}">
              <td data-th-text="${iter.index}"></td>
              <td th:text="${item.ownerId != null ? item.ownerId : item.freqId}"></td>
              <td data-th-text="${item.ownerType.value}"></td>
              <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/freq/edit/{id}(id=${item.freqId})}">Открыть</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
