<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Копирование</title>
</head>
<body>
<div layout:fragment="content" class="container-xxl flex-grow-1 container-p-y">
    <script>
        $("#left-navbar li").removeClass("active");
        $("#freq-li").addClass('active');
    </script>
    <div class="row">
        <!-- Basic Layout -->
        <div class="col-xxl">
            <div class="card mb-4">
                <div class="card-header d-flex align-items-center justify-content-between">
                    <small class="text-muted float-end">Данные по владельцу частотного присвоения</small>
                </div>
                <div class="card-body">
                    <form th:object="${item}" th:action="@{/master/save/}" method="post">
                        <div class="row mb-3">
                            <label class="col-sm-1 col-form-label" for="ownerId">ID</label>
                            <div class="col-sm-2">
                                <input type="number" class="form-control" id="ownerId" placeholder="ID"
                                       th:field="*{ownerModel.ownerId}" readonly>
                            </div>
                            <label class="col-sm-1 col-form-label" for="ownerType">Тип</label>
                            <div class="col-sm-1">
                                <select id="ownerType" class="form-control" th:field="*{ownerModel.ownerType}">
                                    <option th:each="type : ${T(kg.gov.nas.licensedb.enums.OwnerType).values()}"
                                            th:value="${type}"
                                            th:text="${type.value}">
                                    </option>
                                </select>
                            </div>
                            <label class="col-sm-1 col-form-label" for="basic-default-name">Владелец</label>
                            <div class="col-sm-2">
                                <input type="text" class="form-control" id="basic-default-name" placeholder="Владелец"
                                       th:field="*{ownerModel.ownerName}" readonly>
                            </div>
                            <label class="col-sm-1 col-form-label" for="inn">ИНН</label>
                            <div class="col-sm-2">
                                <input type="text" class="form-control" id="inn" placeholder="ИНН"
                                       th:field="*{ownerModel.inn}">
                            </div>
                        </div>

                        <div class="card-header d-flex align-items-center justify-content-between">
                            <small class="text-muted float-end">Данные по пункту установки и оборудованию</small>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-1 col-form-label">ПУ</label>
                            <div class="col-sm-4">
                                <select id="region" class="form-control" th:field="*{siteId}">
                                    <!-- ВАЖНО: пустое значение, чтобы Spring корректно привязал null (а не строку "NULL") -->
                                    <option value="">Все</option>
                                    <option th:each="site : *{sites}"
                                            th:value="${site.siteId}"
                                            th:text="${site.point}">
                                    </option>
                                </select>
                            </div>

                        </div>

                        <div class="card-header d-flex align-items-center justify-content-between">
                            <small class="text-muted float-end">Количество копий</small>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-1 col-form-label">Кол-во</label>
                            <div class="col-sm-2">
                                <input type="number" class="form-control" placeholder="Количество"
                                       th:field="*{count}" min="1" max="500">
                            </div>
                        </div>

                        <div class="row justify-content-end">
                            <div class="col-sm-10">
                                <button type="submit" class="btn btn-primary">Создать</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
