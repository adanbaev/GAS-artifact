<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Вход в систему</title>
    <meta name="description" content="" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon/favicon.ico}"/>

    <!-- Core CSS -->
    <link rel="stylesheet" th:href="@{/css/demo.css}"/>
    <link rel="stylesheet" th:href="@{/css/core.css}" class="template-customizer-core-css"/>
    <link rel="stylesheet" th:href="@{/css/theme-default.css}" class="template-customizer-theme-css"/>

    <!-- Icons -->
    <link rel="stylesheet" th:href="@{/fonts/boxicons.css}"/>

    <link rel="stylesheet" th:href="@{/css/page-auth.css}" class="template-customizer-theme-css"/>

</head>

<body>

<div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
            <div class="card">
                <div class="card-body">
                    <h4 class="mb-2">Добро пожаловать! 👋</h4>
                    <p class="mb-4">Вход в систему</p>

                    <form id="formAuthentication" class="mb-3" th:action="@{/login}" method="POST" autocomplete="off">
                        <!-- CSRF (на случай, если защита включена) -->
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="user_name" class="form-label">Логин</label>
                            <input
                                    type="text"
                                    class="form-control"
                                    id="user_name"
                                    name="user_name"
                                    placeholder="Введите свой логин"
                                    autofocus
                                    required
                                    autocomplete="username"
                                    autocapitalize="none"
                                    spellcheck="false"
                                    th:value="${param.u}"
                            />
                        </div>
                        <div class="mb-3 form-password-toggle">
                            <div class="d-flex justify-content-between">
                                <label class="form-label" for="password">Пароль</label>
                                <a class="small" th:href="@{/forgot-password}">Забыли пароль?</a>
                            </div>
                            <div class="input-group input-group-merge">
                                <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        name="password"
                                        placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                                        aria-describedby="Пароль"
                                        required
                                        autocomplete="current-password"
                                />
                                <span class="input-group-text cursor-pointer" id="togglePassword" title="Показать/скрыть пароль">
                                    <i class="bx bx-hide"></i>
                                </span>
                            </div>

                            <div class="form-text text-danger" id="capsLockHint" style="display:none;">Включен Caps Lock</div>
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary d-grid w-100" type="submit">Войти</button>
                            <div align="center" th:if="${param.error}">
                                <p style="font-size: 20; color: #FF1C19;">Неверный логин или пароль</p>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
  // Показать/скрыть пароль (login.html не использует общий layout, поэтому делаем минимальный JS прямо здесь)
  (function () {
    const btn = document.getElementById('togglePassword');
    const input = document.getElementById('password');
    const capsHint = document.getElementById('capsLockHint');
    if (!btn || !input) return;

    btn.addEventListener('click', function () {
      const icon = btn.querySelector('i');
      const isText = input.getAttribute('type') === 'text';
      input.setAttribute('type', isText ? 'password' : 'text');
      if (icon) {
        icon.classList.toggle('bx-hide', isText);
        icon.classList.toggle('bx-show', !isText);
      }
    });

    // Подсказка про Caps Lock
    input.addEventListener('keyup', function (e) {
      if (!capsHint || !e) return;
      if (typeof e.getModifierState === 'function') {
        capsHint.style.display = e.getModifierState('CapsLock') ? 'block' : 'none';
      }
    });
  })();
</script>
</body>
</html>
