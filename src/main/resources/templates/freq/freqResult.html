<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<script th:inline="javascript">
  /*<![CDATA[*/
  $(document).ready(function () {
    $('#indicatorModal').hide();

    $('.date-input').datepicker({
      locale: 'ru',
      format: 'dd.mm.yyyy',
      todayHighlight: true
    });
  })

  function loadReport() {
    $('#searchForm').attr('action', $('#loadReportUrl').attr('href')).submit();
    $('#searchForm').attr('action', $('#searchReportUrl').attr('href'));
  }

  // Добавление текущего freqId в избранные ID (без ухода со страницы результата)
  function addFavFreq(freqId) {
    if (!freqId) {
      alert("Не указан Freq ID");
      return;
    }
    $('#favFreqId').val(freqId);
    $('#favFreqTitle').val("");
    $('#favReturnTo').val("result");

    $('#searchForm').attr('action', $('#addFavFreqUrl').attr('href')).submit();
    $('#searchForm').attr('action', $('#searchReportUrl').attr('href'));
  }


  function setExportButtonsDisabled(disabled) {
    ['exportBtn', 'clearBtn', 'searchBtn'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.disabled = disabled;
    });
  }

  function showExportOverlay() {
    var el = document.getElementById('exportOverlay');
    if (el) el.style.display = 'flex'; // flex needed for align-items/justify-content classes
    setExportButtonsDisabled(true);
  }

  function hideExportOverlay() {
    var el = document.getElementById('exportOverlay');
    if (el) el.style.display = 'none';
    setExportButtonsDisabled(false);
  }

  // Экспорт в Excel может занимать время (выборка + формирование файла на сервере).
  // Показываем отдельный оверлей ТОЛЬКО для экспорта.
  function exportExcel() {
    var form = document.getElementById('searchForm');
    var urlEl = document.getElementById('loadReportUrl');
    if (!form || !urlEl) return;

    var url = urlEl.getAttribute('href');

    try {
      showExportOverlay();

      var body = new URLSearchParams(new FormData(form));

      fetch(url, {
        method: 'POST',
        body: body,
        credentials: 'same-origin'
      })
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error('HTTP ' + resp.status);
          }
          return resp.blob().then(function (blob) {
            return { blob: blob, resp: resp };
          });
        })
        .then(function (pair) {
          var blob = pair.blob;
          var resp = pair.resp;

          var filename = 'export.xlsx';
          var cd = resp.headers.get('Content-Disposition');
          if (cd) {
            var m = cd.match(/filename\*=UTF-8''([^;]+)|filename=\"?([^\\";]+)\"?/i);
            if (m) {
              filename = decodeURIComponent(m[1] || m[2]);
            }
          }

          var blobUrl = window.URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(blobUrl);
        })
        .catch(function (err) {
          alert('Ошибка экспорта: ' + (err && err.message ? err.message : err));
        })
        .finally(function () {
          hideExportOverlay();
        });

    } catch (e) {
      hideExportOverlay();
      alert('Ошибка экспорта: ' + (e && e.message ? e.message : e));
    }
  }


  function hideEmptySearchWarning() {
    var el = document.getElementById('emptySearchWarning');
    if (el) el.style.display = 'none';
  }

  function showEmptySearchWarning() {
    var el = document.getElementById('emptySearchWarning');
    if (el) {
      el.style.display = 'block';
      el.scrollIntoView({behavior: 'smooth', block: 'center'});
      return;
    }
    alert('Укажите хотя бы один параметр поиска.');
  }

  // Проверка: задан ли хотя бы один критерий поиска.
  // Учитываем: текстовые/числовые/date поля, select (не пусто/не "0"), чекбоксы (checked).
  function hasAnySearchCriteria() {
    var form = document.getElementById('searchForm');
    if (!form) return true;

    var els = form.querySelectorAll('input, select, textarea');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (!el || el.disabled) continue;

      var tag = (el.tagName || '').toLowerCase();
      var type = (el.type || '').toLowerCase();

      // ignore hidden fields used for paging/sorting etc.
      if (type === 'hidden') continue;

      if (type === 'checkbox' || type === 'radio') {
        if (el.checked) return true;
        continue;
      }

      if (tag === 'select') {
        var v = (el.value || '').trim();
        if (v !== '' && v !== '0' && v.toLowerCase() !== 'all') return true;
        continue;
      }

      var v2 = (el.value || '').trim();
      if (v2 !== '') return true;
    }
    return false;
  }

  // Перехватываем глобальную функцию search() из app.js, чтобы не делать "пустой поиск" по всему реестру.
  (function() {
    var _origSearch = window.search;
    window.search = function() {
      hideEmptySearchWarning();
      if (!hasAnySearchCriteria()) {
        showEmptySearchWarning();
        return;
      }
      if (typeof _origSearch === 'function') {
        return _origSearch.apply(this, arguments);
      }
    };
  })();


  function clearToDefault() {
    // Очистка должна возвращать страницу к состоянию по умолчанию (как при входе во вкладку),
    // а не запускать "пустой поиск" по всем данным.
    hideEmptySearchWarning();

    var urlEl = document.getElementById('freqIndexUrl');
    var url = (urlEl && urlEl.getAttribute('href')) ? urlEl.getAttribute('href') : '/freq/index/';
    window.location.href = url;
  }

  /*]]>*/
</script>
<a id="loadReportUrl" type="hidden" th:href="@{/freq/export/}"></a>
<a id="searchReportUrl" type="hidden" th:href="@{/freq/search/}"></a>
<a id="addFavFreqUrl" type="hidden" th:href="@{/favorite-freq/add}"></a>
<a id="freqIndexUrl" type="hidden" th:href="@{/freq/index/}"></a>
<form action="#" id="searchForm" th:action="@{/freq/search/}" th:object="${pattern}" method="post">
  <input type="hidden" id="favFreqId" name="freqId" value=""/>
  <input type="hidden" id="favFreqTitle" name="title" value=""/>
  <input type="hidden" id="favReturnTo" name="returnTo" value="redirect"/>
  <div id="filter-fields">
    <div class="col-xxl">
      <div class="card mb-4">

        <div class="card-body-search">
          <!--<small class="text-light fw-semibold">Данные по владельцу</small>-->
          <div class="row gx-3 gy-2 align-items-center">
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="ownerId">ID</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="ownerId"
                       th:field="*{ownerId}">
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="basic-default-name">Владелец</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="basic-default-name"
                       placeholder="Владелец" th:field="*{name}"/>
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="issueDate">Дата выдачи</label>
              <div class="col-sm-10">
                <input type="text" class="form-control date-input" id="issueDate"
                       placeholder="Дата выдачи" th:field="*{issueDate}"/>
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="expireDate">Дата окончания</label>
              <div class="col-sm-10">
                <input type="text" class="form-control date-input" id="expireDate"
                       placeholder="Дата окончания" th:field="*{expireDate}"/>
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="regDate">Дата регис-и</label>
              <div class="col-sm-10">
                <input type="text" class="form-control date-input" id="regDate"
                       placeholder="Дата регистрации" th:field="*{regDate}"/>
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="invoiceDate">Дата выписки</label>
              <div class="col-sm-10">
                <input type="text" class="form-control date-input" id="invoiceDate"
                       placeholder="Дата выписки счета" th:field="*{invoiceDate}"/>
              </div>
            </div>

          </div>
        </div>
        <div class="card-body-search">
          <!--<small class="text-light fw-semibold">Данные по пункту установки</small>-->
          <div class="row gx-3 gy-2 align-items-center">
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="region">Область</label>
              <div class="col-sm-10">
                <select id="region" class="form-control" th:field="*{region}">
                  <!-- ВАЖНО: пустое значение, чтобы Spring корректно привязал null (а не строку "NULL") -->
                  <option value="">Все области</option>
                  <option th:each="state : ${T(kg.gov.nas.licensedb.enums.Region).values()}"
                          th:value="${state}"
                          th:text="${state.value}">
                  </option>
                </select>
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="point">ПУ</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="point"
                       placeholder="Пункт установки" th:field="*{point}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="number">Счет</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="number"
                       placeholder="Счет" th:field="*{number}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="latitude0">C.Ш.</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="latitude0"
                       th:field="*{latitude0}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="latitude1"></label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="latitude1"
                       th:field="*{latitude1}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="latitude2"></label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="latitude2"
                       th:field="*{latitude2}">
              </div>
            </div>
          </div>
        </div>

        <div class="card-body-search">
          <!--<small class="text-light fw-semibold">Данные по частотам</small>-->
          <div class="row gx-3 gy-2 align-items-center">
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="nominal">Частота МГц</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="nominal"
                       placeholder="Частота" th:field="*{nominal}">
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="band">Полоса КГц</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="band"
                       placeholder="Полоса" th:field="*{band}">
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="state">Статус</label>
              <div class="col-sm-10">
                <select id="state" class="form-control" th:field="*{state}">
                  <!-- ВАЖНО: пустое значение, чтобы Spring корректно привязал null (а не строку "NULL") -->
                  <option value="">Все статусы</option>
                  <option th:each="state : ${T(kg.gov.nas.licensedb.enums.State).values()}"
                          th:value="${state}"
                          th:text="${state.value}">
                  </option>
                </select>
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="longitude0">В.Д.</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="longitude0"
                       th:field="*{longitude0}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="longitude1"></label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="longitude1"
                       th:field="*{longitude1}">
              </div>
            </div>
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="longitude2"></label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="longitude2"
                       th:field="*{longitude2}">
              </div>
            </div>
          </div>

          <div class="row gx-3 gy-2 align-items-center">
            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="state">По одной</label>
              <div class="col-sm-10">
                <input type="checkbox" th:field="*{byOne}" th:value="*{byOne}" />
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="ownerType">Тип</label>
              <div class="col-sm-10">

                <select id="ownerType" class="form-control" th:field="*{type}" >
                  <!-- ВАЖНО: пустое значение, чтобы Spring корректно привязал null (а не строку "NULL") -->
                  <option value="">Все типы</option>
                  <option th:each="type : ${T(kg.gov.nas.licensedb.enums.OwnerType).values()}"
                          th:value="${type}"
                          th:text="${type.value}">
                  </option>
                </select>
              </div>
            </div>

            <div class="col-md-2">
              <label class="col-sm-4 col-form-label-sm" for="licNum">Номер</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="licNum"
                       th:field="*{licNumber}">
              </div>
            </div>
          </div>

          <div class="row justify-content-end">
            <div class="demo-inline-spacing">
              <button type="button" class="btn rounded-pill btn-success" id="exportBtn" onclick="exportExcel()">
                Экспорт
              </button>
              <button type="button" class="btn rounded-pill btn-outline-secondary"
                      id="clearBtn" onclick="clearToDefault()">
                Очистить
              </button>
              <button type="button" class="btn rounded-pill btn-primary" id="searchBtn" onclick="search()">
                Поиск
              </button>
            </div>
            <div id="emptySearchWarning" class="alert alert-warning mt-3" style="display:none;">
              Укажите хотя бы один параметр поиска. Чтобы просмотреть реестр без фильтров, используйте постраничный просмотр (не нажимая «Поиск»).
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
  <div>
    <!-- Оверлей только для экспорта (Excel). Не влияет на обычные AJAX-поиски/пагинацию. -->
    <div id="exportOverlay" class="align-items-center justify-content-center"
         style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.70); z-index:2100;">
      <div class="text-center">
        <div class="spinner-border spinner-border-lg text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="mt-2 text-muted">Формируется Excel…</div>
      </div>
    </div>

    <div id="indicatorModal" class="text-center">
      <div class="spinner-border spinner-border-lg text-primary "
           role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <table class="table table-bordered table-hover table-striped"
           data-pagination="true"
           data-side-pagination="server">
      <thead>
      <tr class="filters">
        <input type="hidden" th:field="*{pageSize}" id="pageSize"/>
        <input type="hidden" th:field="*{page}" id="page"/>

        <th>ID</th>
        <th>Тип</th>
        <th>Владелец</th>
        <th>ПУ</th>
        <th>Частота</th>
        <th>Полоса</th>
        <th>Действие</th>
      </tr>
      </thead>
      <tbody>
      <tr data-th-each="item : ${items}">
        <td data-th-text="${item.ownerId}"></td>
        <td data-th-text="${item.ownerType.value}"></td>
        <td data-th-text="${item.ownerName}"></td>

        <td data-th-text="${item.point}"></td>
        <td data-th-text="${item.nominal}"></td>
        <td data-th-text="${item.band}"></td>

        <td>
          <div class="dropdown">
            <button type="button" class="btn p-0 dropdown-toggle hide-arrow" data-bs-toggle="dropdown" data-bs-boundary="viewport" data-bs-offset="0,6">
              <i class="bx bx-dots-vertical-rounded"></i>
            </button>
            <div class="dropdown-menu dropdown-menu-end overflow-auto" style="max-height: calc(100vh - 200px);">
              <a class="dropdown-item" th:href="@{/master/copy/{id}(id=${item.ownerId})}" sec:authorize="hasAnyRole('ADMIN','OPERATOR')">
                <i class="bx bx-copy me-1"></i>Копировать</a>
              <a class="dropdown-item" th:href="@{/freq/edit/{id}(id=${item.freqId})}" sec:authorize="hasAnyRole('ADMIN','OPERATOR')">
                <i class="bx bx-edit-alt me-1"></i>Редактировать</a>

              <button type="button"
                      class="dropdown-item"
                      th:attr="onclick=|addFavFreq(${item.freqId})|"
                      sec:authorize="hasAnyRole('ADMIN','OPERATOR','PRINTER')">
                <i class="bx bx-star me-1"></i>В избранные ID
              </button>
            </div>
          </div>
        </td>
      </tr>
      </tbody>
    </table>

  </div>
</form>
<object th:include="partial/pagination" th:remove="tag"></object>
</html>
