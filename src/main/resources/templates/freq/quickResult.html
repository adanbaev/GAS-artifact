<div xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

  <script th:inline="javascript">
    /*<![CDATA[*/
    function addFavFreqQuick(freqId) {
      if (!freqId) {
        alert("Не указан Freq ID");
        return;
      }
      $('#favFreqQuickId').val(freqId);
      $('#favFreqQuickTitle').val("");
      $('#favFreqQuickReturnTo').val("redirect");
      $('#favFreqQuickForm').submit();
    }
    /*]]>*/
  </script>

  <!-- Скрытая форма для добавления Freq ID в избранное (три точки → меню) -->
  <form id="favFreqQuickForm" th:action="@{/favorite-freq/add}" method="post" class="d-none">
    <input type="hidden" id="favFreqQuickId" name="freqId" value=""/>
    <input type="hidden" id="favFreqQuickTitle" name="title" value=""/>
    <input type="hidden" id="favFreqQuickReturnTo" name="returnTo" value="redirect"/>
  </form>

  <div class="card mt-3">
    <div class="card-header d-flex align-items-center justify-content-between">
      <div>
        <strong>Результаты</strong>
        <span class="text-muted ms-2" th:if="${items != null}">
          Найдено: <span th:text="${items.getTotalElements()}"></span>
        </span>
      </div>
    </div>

    <div class="card-body p-0">
      <div class="p-3 text-muted" th:if="${items == null || items.getTotalElements() == 0}">
        Ничего не найдено.
      </div>

      <div class="table-responsive" style="overflow-x: auto; overflow-y: visible;" th:if="${items != null && items.getTotalElements() > 0}">
        <table class="table table-bordered table-hover table-striped mb-0">
          <thead>
          <tr class="filters">
            <th>ID</th>
            <th>Тип</th>
            <th>Владелец</th>
            <th>ПУ</th>
            <th>Частота</th>
            <th>Полоса</th>
            <th style="width: 70px">Действие</th>
          </tr>
          </thead>
          <tbody>
          <tr data-th-each="item : ${items}">
            <td data-th-text="${item.ownerId}"></td>
            <td data-th-text="${item.ownerType.value}"></td>
            <td data-th-text="${item.ownerName}"></td>
            <td data-th-text="${item.point}"></td>
            <td data-th-text="${item.nominal}"></td>
            <td data-th-text="${item.band}"></td>
            <td>
              <div class="dropdown">
                <button type="button" class="btn p-0 dropdown-toggle hide-arrow" data-bs-toggle="dropdown" data-bs-boundary="viewport" data-bs-offset="0,6">
                  <i class="bx bx-dots-vertical-rounded"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-end overflow-auto" style="max-height: calc(100vh - 200px);">
                  <a class="dropdown-item" th:href="@{/master/copy/{id}(id=${item.ownerId})}" sec:authorize="hasAnyRole('ADMIN','OPERATOR')">
                    <i class="bx bx-copy me-1"></i>Копировать</a>
                  <a class="dropdown-item" th:href="@{/freq/edit/{id}(id=${item.freqId})}" sec:authorize="hasAnyRole('ADMIN','OPERATOR')">
                    <i class="bx bx-edit-alt me-1"></i>Редактировать</a>

                  <button type="button"
                          class="dropdown-item"
                          th:attr="onclick=|addFavFreqQuick(${item.freqId})|"
                          sec:authorize="hasAnyRole('ADMIN','OPERATOR','PRINTER')">
                    <i class="bx bx-star me-1"></i>В избранные ID
                  </button>
                </div>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <object th:include="partial/pagination" th:remove="tag"></object>

</div>
